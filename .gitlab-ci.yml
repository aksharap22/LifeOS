image: node:20

stages:
  - install
  - lint
  - build
  - test

variables:
  # Updated paths to point inside your active subfolder
  BACKEND_DIR: "lifeos/backend"
  FRONTEND_DIR: "lifeos/frontend"
  
  # --- Performance Overrides for Local Laptop Runners ---
  # Prevents git from nuking and rebuilding node_modules on every single stage transition
  GIT_CLEAN_FLAGS: "-ffdx -e lifeos/backend/node_modules/ -e lifeos/frontend/node_modules/"
  # Shallow clone to speed up project fetching down to seconds
  GIT_DEPTH: "1"

# Global cache configuration across jobs
cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - lifeos/backend/node_modules/
    - lifeos/frontend/node_modules/
    - .npm/

# --- Install Stage ---

backend-install:
  stage: install
  script:
    - cd $BACKEND_DIR
    # Clean install with network performance flags
    - npm install --no-audit --no-fund --prefer-offline
  artifacts:
    paths:
      - lifeos/backend/node_modules/
    expire_in: 1 hour

frontend-install:
  stage: install
  script:
    - cd $FRONTEND_DIR
    # Clean install with network performance flags
    - npm install --no-audit --no-fund --prefer-offline
  artifacts:
    paths:
      - lifeos/frontend/node_modules/
    expire_in: 1 hour

# --- Lint Stage ---

frontend-lint:
  stage: lint
  allow_failure: true
  script:
    - cd $FRONTEND_DIR
    - npm run lint
  dependencies:
    - frontend-install

# --- Build Stage ---

backend-build:
  stage: build
  script:
    - cd $BACKEND_DIR
    - npm run build || echo "No build script specified" 
  dependencies:
    - backend-install

frontend-build:
  stage: build
  script:
    - cd $FRONTEND_DIR
    - npm run build || echo "Build completed with warnings or script skipped"
  dependencies:
    - frontend-install

# --- Test Stage ---

backend-test:
  stage: test
  allow_failure: true  # Tells GitLab to mark this block with a warning instead of a hard crash
  script:
    - cd $BACKEND_DIR
    - npm test
  dependencies:
    - backend-install