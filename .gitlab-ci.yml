image: node:20

stages:
  - install
  - lint
  - build
  - test

variables:
  # Project subdirectory paths
  BACKEND_DIR: "lifeos/backend"
  FRONTEND_DIR: "lifeos/frontend"

  # --- THE ABSOLUTE RESET FLAGS ---
  GIT_STRATEGY: clone
  GIT_DEPTH: "0"

# --- Global Workflow Rules ---
workflow:
  rules:
    - changes:
        - "**/*.md"
        - ".github/**/*"
      when: never
    - when: always

# --- Install Stage ---

backend-install:
  stage: install
  script:
    - cd $BACKEND_DIR
    - npm install --no-audit --no-fund --prefer-offline

frontend-install:
  stage: install
  script:
    - cd $FRONTEND_DIR
    - npm install --no-audit --no-fund --prefer-offline

# --- Lint Stage ---

frontend-lint:
  stage: lint
  allow_failure: true
  script:
    - cd $FRONTEND_DIR
    - npm run lint

# --- Build Stage ---

backend-build:
  stage: build
  script:
    - cd $BACKEND_DIR
    - npm run build || echo "No build script specified"

frontend-build:
  stage: build
  script:
    - cd $FRONTEND_DIR
    - npm run build || echo "Build completed with warnings or script skipped"

# --- Test Stage ---

backend-test:
  stage: test
  allow_failure: true
  script:
    - cd $BACKEND_DIR
    - npm test
